name: Update publications from BibTeX

on:
  push:
    paths:
      - "publications.bib"
      - "scripts/update_publications_from_bib.py"
      - ".github/workflows/update-publications.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-publications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bibtexparser

      - name: Update README from BibTeX
        run: python scripts/update_publications_from_bib.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          git commit -m "Update publications from BibTeX"

          git pull --rebase origin main
          git push origin main
