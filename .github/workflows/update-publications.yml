name: Update publications from BibTeX

on:
  push:
    paths:
      - "publications.bib"
      - "scripts/update_publications_from_bib.py"
      - "README.md"
      - ".github/workflows/update-publications.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bibtexparser

      - name: Update README from BibTeX
        run: python scripts/update_publications_from_bib.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update publications from BibTeX"
          git push
